<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление сотрудниками</title>
</head>
<body>
    <h1>Управление сотрудниками</h1>

    <form id="employeeForm">
        <div class="form-group">
            <label>Фамилия и имя:</label>
            <input type="text" id="name" required placeholder="Иван Петров">
        </div>
        <div class="form-group">
            <label>Возраст:</label>
            <input type="number" id="age" min="16" max="100" required placeholder="30">
        </div>
        <div class="form-group">
            <label>Должность:</label>
            <input type="text" id="position" required placeholder="Слесарь">
        </div>
        <div class="form-group">
            <label>Зарплата:</label>
            <input type="number" id="salary" min="0" step="100" required placeholder="50000">
        </div>
        <div class="form-group">
            <label>Есть дети?</label>
            <input type="checkbox" id="hasChildren">
        </div>
        <div class="form-group">
            <label>Тип сотрудника:</label>
            <select id="type" required>
                <option value="">Выберите...</option>
                <option value="Plumber">Слесарь</option>
                <option value="Driver">Водитель</option>
            </select>
        </div>
        <div class="form-group" id="plumberFields" style="display: none;">
            <label>Инструменты (через запятую):</label>
            <input type="text" id="tools" placeholder="ключ, лента, отвёртка">
        </div>
        <div class="form-group" id="driverFields" style="display: none;">
            <label>Модель автоlabel>
            <input type="text" id="carModel" placeholder="Toyota Camry">
        </div>
        <button type="submit">Сохранить</button>
    </form>

    <h2>Список сотрудников</h2>
    <table id="employeesTable">
        <thead>
            <tr>
                <th>ФИО</th>
                <th>Возраст</th>
                <th>Должность</th>
                <th>Зарплата</th>
                <th>Дети</th>
                <th>Тип</th>
                <th>Доп. инфо</th>
                <th>Действие</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
